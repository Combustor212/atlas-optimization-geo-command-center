version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: agency-os-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: agencyos
      POSTGRES_PASSWORD: agencyos_dev_password
      POSTGRES_DB: agencyos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

